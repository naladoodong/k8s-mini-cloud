apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-mysql-nfs
  labels:
    project: k8s-mini-cloud
    component: mysql
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-static
  mountOptions:
    - nfsvers=4.1
  nfs:
    path: /srv/nfs/mysql
    server: 10.10.8.100
